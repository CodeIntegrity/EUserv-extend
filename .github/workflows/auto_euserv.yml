name: Auto EUserv

on:
  schedule:
    - cron: '0 12 * * SUN'  # 每周日 UTC 时间 12:00 运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'  # 指定Python3.x

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Run script
      env:
        EUSERV_USERNAME: ${{ secrets.EUSERV_USERNAME }}
        EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
        CAPTCHA_SOLVER_TYPE: ${{ secrets.CAPTCHA_SOLVER_TYPE }}
        TRUECAPTCHA_USERID: ${{ secrets.TRUECAPTCHA_USERID }}
        TRUECAPTCHA_APIKEY: ${{ secrets.TRUECAPTCHA_APIKEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_USER_ID: ${{ secrets.TG_USER_ID }}
        IMAP_HOST: ${{ vars.IMAP_HOST }}
        IMAP_PORT: ${{ vars.IMAP_PORT }}
        IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
        IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        IMAP_MAILBOX: ${{ vars.IMAP_MAILBOX }}
        IMAP_USE_SSL: ${{ vars.IMAP_USE_SSL }}
        IMAP_SEARCH_CRITERIA: ${{ vars.IMAP_SEARCH_CRITERIA }}
        IMAP_PIN_MAX_RETRIES: ${{ vars.IMAP_PIN_MAX_RETRIES }}
        IMAP_PIN_RETRY_DELAY: ${{ vars.IMAP_PIN_RETRY_DELAY }}
        IMAP_LOOKBACK_LIMIT: ${{ vars.IMAP_LOOKBACK_LIMIT }}
        PUSH_TYPE: ${{ vars.PUSH_TYPE }}
        GOTIFY_URL: ${{ vars.GOTIFY_URL }}
        GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
      run: uv run --with-requirements requirements.txt python Github_Action.py
